<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Kulübü Yönetimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Sadece giriş yapıldığında kulüp panelini göstereceğiz */
        #dashboard { display: none; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Öğrenci Kulübü Yönetim Sistemi</h1>

    <div id="auth-section" class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h5 class="card-title text-center" id="auth-title">Giriş Yap</h5>
            <form id="auth-form">
                <div class="mb-3">
                    <label class="form-label">Kullanıcı Adı</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Şifre</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="auth-btn">Giriş</button>
            </form>
            <div class="text-center mt-3">
                <a href="#" id="toggle-auth" onclick="toggleAuthMode()">Hesabın yok mu? Kayıt Ol</a>
            </div>
            <div id="auth-message" class="text-danger mt-2 text-center"></div>
        </div>
    </div>

    <div id="dashboard">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Kulüplerim</h3>
            <button class="btn btn-danger" onclick="logout()">Çıkış Yap</button>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <form id="club-form" class="d-flex gap-2">
                    <input type="text" id="club-name" class="form-control" placeholder="Kulüp Adı" required>
                    <input type="text" id="club-desc" class="form-control" placeholder="Açıklama" required>
                    <button type="submit" class="btn btn-success">Ekle</button>
                </form>
            </div>
        </div>

        <div class="row" id="clubs-container">
            </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
